    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is my vocal range?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your vocal range is the span from the lowest to the highest note you can comfortably sing. Voice Mirror measures it in under a minute by analyzing a low-to-high siren glide directly in your browser."
          }
        },
        {
          "@type": "Question",
          "name": "Am I tone deaf?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "True tone deafness (amusia) is rare. Most people who worry about it simply haven't trained pitch matching. Voice Mirror measures how close you sing to five reference notes, in cents, so you get a real number instead of a label."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is a browser pitch test?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Modern pitch detection (YIN/MPM) running on raw, unprocessed microphone input resolves pitch to within a few cents — far finer than a semitone. Voice Mirror disables echo cancellation and noise suppression so the detector sees your true voice."
          }
        }
      ]
    }
    </script>
