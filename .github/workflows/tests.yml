name: Tests

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        # build:e2e is fully prod-isolated: empty VITE_API_BASE_URL (runs on the
        # local Dexie adapter — never touches the prod API/DB) plus empty Ads/GA4
        # ids (a tag-active build in headless localhost would fire real hits).
        # Run as a package.json script so `cross-env` resolves from
        # node_modules/.bin (a bare `cross-env` isn't on PATH here — exit 127).
        run: pnpm run build:e2e

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests (Smoke)
        if: github.event_name == 'pull_request'
        run: pnpm run test:e2e --grep @smoke

      - name: Run E2E tests (Full)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        run: pnpm run test:e2e
