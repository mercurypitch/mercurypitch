name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: App

      - name: Run type check
        run: npm run typecheck
        working-directory: App

      - name: Run tests
        run: npm run test:run
        working-directory: App

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: App

      - name: Build app
        run: npm run build
        working-directory: App

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: App

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: App