name: Build & Deploy

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build-and-deploy:
    name: Build & Deploy App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.environment }}" == "dev" ]]; then
              pnpm run build:dev
            else
              pnpm run build
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            pnpm run build:dev
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm run build:dev
          else
            pnpm run build
          fi

      - name: Verify build output
        run: |
          test -f dist/index.html || exit 1
          ls dist/assets/*.js >/dev/null 2>&1 || exit 1
          ls dist/assets/*.css >/dev/null 2>&1 || exit 1
          echo "Build artifacts verified"

      # Manual Deploy via workflow_dispatch
      - name: Manual Deploy
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ github.event.inputs.environment }}
          packageManager: 'pnpm'

      # Deploys to dev.mercurypitch.com when pushing to the dev branch
      - name: Deploy to Dev Environment
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          packageManager: 'pnpm'

      # Deploys to mercurypitch-preview.workers.dev on PRs
      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          packageManager: 'pnpm'

      # Deploys to mercurypitch.com when pushing a tag starting with 'v'
      - name: Deploy to Production Environment
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env prod
          packageManager: 'pnpm'
