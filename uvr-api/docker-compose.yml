services:
  uvr-api:
    build: .
    container_name: uvr-api
    ports:
      - "8000:8000"
    volumes:
      - /tmp/uvr:/tmp/uvr
      - ./output:/app/output
      - ./api.py:/app/api.py
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    # Add these devices for AMD GPU Pass-through (otherwise CPU based)
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    environment:
      - PYTHONUNBUFFERED=1
