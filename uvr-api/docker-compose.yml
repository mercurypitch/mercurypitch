services:
  uvr-api:
    build: .
    container_name: uvr-api
    ports:
      - "8080:8080"
    volumes:
      - ./models:/tmp/audio-separator-models
      - ./output:/app/output
      - ./api.py:/app/api.py
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8080 --reload
    group_add:
      - video
    environment:
      - PYTHONUNBUFFERED=1
