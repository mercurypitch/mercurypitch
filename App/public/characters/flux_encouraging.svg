<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Flux: Vocal Runs Specialist (Encouraging) -->
  <defs>
    <linearGradient id="fluxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M50 20 C70 20 80 40 80 60 C80 80 60 90 40 90 C20 90 20 70 20 50 C20 30 30 20 50 20" fill="url(#fluxGrad)" />
  <!-- Push Forward Lines -->
  <path d="M10 50 L0 50" stroke="#3fb950" stroke-width="4" opacity="0.4" />
  <path d="M10 60 L5 60" stroke="#3fb950" stroke-width="2" opacity="0.3" />
  <!-- Eyes (Wink/Cool) -->
  <path d="M35 50 Q40 45 45 50" stroke="white" stroke-width="3" fill="none" />
  <rect x="58" y="48" width="8" height="3" rx="1.5" fill="white" />
  <!-- Mouth (Grin) -->
  <path d="M40 70 Q50 80 65 70" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
