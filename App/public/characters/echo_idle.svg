<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Echo: Vibrato/Resonance Specialist (Idle) -->
  <defs>
    <linearGradient id="echoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a6460;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body (Concentric Circles/Rings) -->
  <circle cx="50" cy="50" r="35" fill="url(#echoGrad)" />
  <circle cx="50" cy="50" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.3" />
  <!-- Eyes (Vibrating) -->
  <circle cx="42" cy="45" r="3" fill="white" />
  <circle cx="58" cy="45" r="3" fill="white" />
  <!-- Mouth (Resonant Circle) -->
  <circle cx="50" cy="65" r="4" stroke="white" stroke-width="1.5" fill="none" />
</svg>
