<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" width="520" height="128" role="img" aria-label="MercuryPitch logo lockup">
  <defs>
    <radialGradient id="lkBody" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="28%" stop-color="#aeb9c6" />
      <stop offset="62%" stop-color="#5b6b7b" />
      <stop offset="100%" stop-color="#1b2430" />
    </radialGradient>
    <linearGradient id="lkRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" />
      <stop offset="0.5" stop-color="#2dd4bf" />
      <stop offset="1" stop-color="#bc8cff" />
    </linearGradient>
    <clipPath id="lkClip"><circle cx="64" cy="64" r="42" /></clipPath>
  </defs>

  <!-- Mark -->
  <circle cx="64" cy="64" r="47" fill="none" stroke="url(#lkRim)" stroke-width="3" opacity="0.9" />
  <circle cx="64" cy="64" r="42" fill="url(#lkBody)" />
  <g clip-path="url(#lkClip)">
    <path d="M22 72 C 36 46, 48 46, 64 64 S 92 82, 106 56"
          fill="none" stroke="#0b0e14" stroke-width="6" stroke-linecap="round" opacity="0.92" />
  </g>

  <!-- Wordmark: 'Mercury' in chrome-white, 'Pitch' in spectrum -->
  <text x="128" y="78" font-family="Outfit, 'Plus Jakarta Sans', Inter, sans-serif" font-weight="600" font-size="46" letter-spacing="-1.5">
    <tspan fill="#e6edf3">Mercury</tspan><tspan fill="url(#lkRim)">Pitch</tspan>
  </text>
</svg>
