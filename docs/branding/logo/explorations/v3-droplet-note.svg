<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="MercuryPitch — Droplet note">
  <defs>
    <radialGradient id="v3d" cx="40%" cy="30%" r="80%">
      <stop offset="0" stop-color="#d8f3ff"/><stop offset=".35" stop-color="#58a6ff"/>
      <stop offset=".75" stop-color="#2dd4bf"/><stop offset="1" stop-color="#1a8a94"/>
    </radialGradient>
    <linearGradient id="v3s" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/><stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <!-- wave / staff the note sits on -->
  <path d="M12 44 C 30 30, 44 58, 62 44 S 96 30, 116 46" fill="none" stroke="url(#v3s)" stroke-width="6" stroke-linecap="round" opacity=".85"/>
  <!-- mercury droplet doubling as a note head -->
  <path d="M64 118 C 40 92, 40 74, 64 48 C 88 74, 88 92, 64 118 Z" fill="url(#v3d)"/>
  <!-- highlight -->
  <ellipse cx="55" cy="70" rx="7" ry="11" fill="#fff" opacity=".55" transform="rotate(-18 55 70)"/>
  <!-- inner pitch wave carved in the droplet -->
  <path d="M50 92 C 55 84, 59 100, 64 92 S 73 84, 78 92" fill="none" stroke="#0b2b33" stroke-width="3.4" stroke-linecap="round" opacity=".8"/>
</svg>
