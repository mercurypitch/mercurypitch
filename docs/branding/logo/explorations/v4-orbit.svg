<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="MercuryPitch — Orbit pitch">
  <defs>
    <radialGradient id="v4p" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".3" stop-color="#c3ccd6"/>
      <stop offset=".7" stop-color="#5b6b7b"/><stop offset="1" stop-color="#161d29"/>
    </radialGradient>
    <linearGradient id="v4o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/><stop offset=".5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <!-- orbit ellipse whose front arc becomes a waveform -->
  <g fill="none" stroke="url(#v4o)" stroke-linecap="round">
    <path d="M96 44 A 46 22 0 1 1 33 40" stroke-width="4" opacity=".7"/>
    <!-- front of orbit as a pitch wave -->
    <path d="M30 78 C 42 64, 52 92, 64 78 S 88 64, 100 80" stroke-width="6"/>
  </g>
  <!-- Mercury planet -->
  <circle cx="64" cy="58" r="20" fill="url(#v4p)"/>
  <ellipse cx="57" cy="50" rx="7" ry="4.5" fill="#fff" opacity=".8" transform="rotate(-22 57 50)"/>
  <!-- tiny crater detail -->
  <circle cx="72" cy="64" r="3" fill="#3a4552" opacity=".5"/>
</svg>
