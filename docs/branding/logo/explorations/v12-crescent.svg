<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="MercuryPitch — Crescent Planet">
  <defs>
    <radialGradient id="v12p" cx="70%" cy="34%" r="80%">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".35" stop-color="#cbd4de"/>
      <stop offset=".7" stop-color="#69737f"/><stop offset="1" stop-color="#3a4552"/>
    </radialGradient>
    <linearGradient id="v12g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/><stop offset=".5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <clipPath id="v12c"><circle cx="64" cy="64" r="48"/></clipPath>
  </defs>
  <!-- shadow disc -->
  <circle cx="64" cy="64" r="48" fill="#1b232e"/>
  <g clip-path="url(#v12c)">
    <!-- large lit gibbous: shadow bite only on the left, terminator is a sine wave -->
    <path d="M52 16 C 40 40, 40 88, 52 112 L 112 112 L 112 16 Z" fill="url(#v12p)"/>
    <g fill="#8894a2" opacity=".4"><circle cx="86" cy="50" r="6"/><circle cx="94" cy="76" r="7"/><circle cx="76" cy="90" r="4"/><circle cx="72" cy="40" r="3.5"/></g>
    <ellipse cx="86" cy="40" rx="14" ry="8" fill="#fff" opacity=".5" transform="rotate(-20 86 40)"/>
  </g>
  <!-- glowing terminator wave -->
  <path d="M52 16 C 40 40, 40 88, 52 112" fill="none" stroke="url(#v12g)" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 16 C 40 40, 40 88, 52 112" fill="none" stroke="#eafcff" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#v12g)" stroke-width="2" opacity=".5"/>
</svg>
