<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="MercuryPitch — Sound Globe">
  <defs>
    <radialGradient id="v15bg" cx="42%" cy="34%" r="75%">
      <stop offset="0" stop-color="#1c2634"/><stop offset="1" stop-color="#0a0e14"/>
    </radialGradient>
    <linearGradient id="v15g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/><stop offset=".5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <clipPath id="v15c"><circle cx="64" cy="64" r="50"/></clipPath>
  </defs>
  <circle cx="64" cy="64" r="50" fill="url(#v15bg)"/>
  <g clip-path="url(#v15c)" fill="none" stroke="url(#v15g)" stroke-linecap="round">
    <!-- latitude lines that ripple like waveforms -->
    <path d="M14 44 C 30 38, 40 50, 54 44 S 84 38, 114 46" stroke-width="2.6" opacity=".55"/>
    <path d="M10 62 C 28 52, 44 74, 64 62 S 100 50, 118 64" stroke-width="4" opacity=".95"/>
