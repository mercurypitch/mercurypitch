    <path d="M22 98 C 38 94, 50 102, 64 98 S 90 92, 106 100" stroke-width="2.4" opacity=".45"/>
    <!-- meridian -->
    <ellipse cx="64" cy="64" rx="20" ry="50" stroke-width="1.6" opacity=".3"/>
  </g>
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#v15g)" stroke-width="2.5" opacity=".9"/>
  <ellipse cx="46" cy="40" rx="12" ry="7" fill="#fff" opacity=".14" transform="rotate(-22 46 40)"/>
</svg>
