    <path d="M6 70 C 24 52, 40 52, 64 68 S 104 84, 122 66" fill="none" stroke="url(#v1rim)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M6 70 C 24 52, 40 52, 64 68 S 104 84, 122 66" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
