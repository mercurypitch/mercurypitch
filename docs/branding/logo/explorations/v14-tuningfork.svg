      <stop offset="0" stop-color="#c8d2dd"/><stop offset=".45" stop-color="#7c8794"/><stop offset="1" stop-color="#2c3540"/>
    </linearGradient>
    <linearGradient id="v14g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/><stop offset=".5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#bc8cff"/>
