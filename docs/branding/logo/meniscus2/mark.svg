<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MercuryPitch — Meniscus v2. One idea, three shapes: quicksilver dome,
       deep liquid, and a single pitch-wave waterline. -->
  <defs>
    <clipPath id="orb"><circle cx="256" cy="256" r="246"/></clipPath>
    <radialGradient id="chrome" cx="0.38" cy="0.28" r="1.05">
      <stop offset="0" stop-color="#f4f8fd"/>
      <stop offset="0.32" stop-color="#c3ccd6"/>
      <stop offset="0.62" stop-color="#8a97a6"/>
      <stop offset="1" stop-color="#3d4b5c"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3050"/>
      <stop offset="0.55" stop-color="#131f36"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#orb)">
    <!-- quicksilver dome -->
    <circle cx="256" cy="256" r="246" fill="url(#chrome)"/>
    <!-- the liquid: everything under the pitch wave -->
    <path d="M8,256 C96,164 164,164 256,256 S416,348 504,256 A248,248 0 0 1 8,256 Z" fill="url(#liquid)"/>
    <!-- the waterline IS the pitch wave -->
    <path d="M8,256 C96,164 164,164 256,256 S416,348 504,256" fill="none" stroke="url(#spectrum)" stroke-width="22" stroke-linecap="round"/>
    <!-- crisp specular -->
    <ellipse cx="180" cy="128" rx="52" ry="26" fill="#ffffff" opacity="0.85" transform="rotate(-20 180 128)"/>
  </g>
  <!-- hairline rim so the orb holds on any ground -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="#c3ccd6" stroke-opacity="0.35" stroke-width="4"/>
</svg>
