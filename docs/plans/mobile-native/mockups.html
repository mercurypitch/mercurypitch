<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MercuryPitch — Mobile Native v2 mockups</title>
<style>
  /* Tokens mirrored from src/styles/app.css */
  :root{
    --bg-primary:#0d1117; --bg-secondary:#161b22; --bg-tertiary:#21262d;
    --bg-card:#1c2128; --border:#30363d; --text-primary:#e6edf3;
    --text-secondary:#a8b3bf; --text-muted:#6e7681; --accent:#58a6ff;
    --accent-dim:rgba(88,166,255,.15); --green:#3fb950; --purple:#bc8cff;
    --red:#f85149; --radius-lg:12px; --radius-pill:999px;
    --glass-bg:rgba(22,27,34,.72); --glass-border:rgba(230,237,243,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#07090d;color:var(--text-primary);
    font:14px/1.45 Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:32px 20px 60px}
  h1{font-size:22px;margin-bottom:4px}
  .sub{color:var(--text-secondary);margin-bottom:28px;max-width:760px}
  .row{display:flex;flex-wrap:wrap;gap:36px;justify-content:center}
  figure{text-align:center}
  figcaption{margin-top:12px;color:var(--text-secondary);font-size:13px;max-width:300px}
  /* ── Phone frame ── */
  .phone{width:300px;height:640px;background:var(--bg-primary);border-radius:44px;
    border:6px solid #1f242c;position:relative;overflow:hidden;text-align:left;
    box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column}
  .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:86px;height:22px;background:#000;border-radius:14px;z-index:50}
  .homebar{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    width:110px;height:4px;background:#4b5563;border-radius:4px;z-index:50}
  /* ── Shared chrome ── */
  .chips{display:flex;gap:6px;align-items:center;padding:40px 12px 8px}
  .chip{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);
    font-size:11px;padding:5px 10px;border-radius:var(--radius-pill);white-space:nowrap}
  .chip.acc{color:var(--accent);border-color:var(--accent-dim);background:var(--accent-dim)}
  .chip.right{margin-left:auto}
  .progress{height:3px;margin:0 12px;background:var(--bg-tertiary);border-radius:2px;position:relative}
  .progress i{position:absolute;inset:0 62% 0 0;background:var(--accent);border-radius:2px}
  .transport{position:absolute;left:0;right:0;bottom:64px;display:flex;gap:10px;align-items:center;
    justify-content:center;padding:10px 14px 12px;
    background:linear-gradient(transparent,rgba(7,9,13,.85) 40%)}
  .tbtn{width:44px;height:44px;border-radius:50%;background:var(--glass-bg);
    border:1px solid var(--glass-border);backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;color:var(--text-primary);font-size:15px}
  .tbtn.primary{width:56px;height:56px;background:var(--accent);color:#08131f;font-size:20px}
  .tbtn.rec{color:var(--red)}
  .tbtn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .tbtn.primary svg{width:24px;height:24px;fill:currentColor;stroke:none}
  .mico svg,.cico svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .seg{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(14px);
    border-radius:var(--radius-pill);padding:6px 12px;font-size:11px;color:var(--text-secondary)}
  .seg b{color:var(--text-primary);font-weight:600}
  /* ── Tab bar ── */
  .tabbar{position:absolute;left:10px;right:10px;bottom:14px;height:52px;border-radius:26px;
    background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(18px) saturate(1.35);
    display:flex;align-items:center;justify-content:space-around;z-index:40}
  .tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;
    color:var(--text-muted);min-width:52px}
  .tab svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--accent)}
  /* ── Singing canvas ── */
  .canvas{position:absolute;inset:96px 0 128px;overflow:hidden;
    background:
      repeating-linear-gradient(0deg,transparent 0 35px,rgba(48,54,61,.55) 35px 36px)}
  .note{position:absolute;height:26px;border-radius:7px;background:var(--bg-tertiary);
    border:1px solid var(--border);color:var(--text-muted);font-size:10px;
    display:flex;align-items:center;padding:0 8px}
  .note.hit{background:rgba(63,185,80,.22);border-color:var(--green);color:var(--green)}
  .note.cur{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .trace{position:absolute;inset:0;width:100%;height:100%}
  .ball{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 14px var(--accent)}
  .hud{position:absolute;top:8px;right:10px;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .hudchip{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(12px);
    font-size:11px;padding:5px 10px;border-radius:10px;color:var(--text-secondary)}
  .hudchip b{color:var(--green)}
  /* ── Sheet ── */
  .dim{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:44}
  .sheet{position:absolute;left:6px;right:6px;bottom:0;z-index:45;background:var(--bg-secondary);
    border:1px solid var(--border);border-radius:20px 20px 24px 24px;padding:8px 16px 26px}
  .grab{width:38px;height:4px;background:var(--border);border-radius:3px;margin:4px auto 12px}
  .sheet h3{font-size:12px;color:var(--text-muted);text-transform:uppercase;
    letter-spacing:.06em;margin:14px 0 6px}
  .srow{display:flex;align-items:center;min-height:44px;border-bottom:1px solid rgba(48,54,61,.5);
    font-size:14px;gap:10px}
  .srow:last-child{border-bottom:0}
  .srow .val{margin-left:auto;color:var(--text-secondary);font-size:13px}
  .srow .toggle{margin-left:auto;width:40px;height:24px;border-radius:14px;background:var(--bg-tertiary);
    border:1px solid var(--border);position:relative}
  .srow .toggle.on{background:var(--green)}
  .srow .toggle i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff}
  .srow .toggle.on i{left:auto;right:2px}
  .slider{margin-left:auto;width:130px;height:4px;border-radius:2px;background:var(--bg-tertiary);position:relative}
  .slider i{position:absolute;left:0;top:0;bottom:0;width:60%;background:var(--accent);border-radius:2px}
  .slider b{position:absolute;top:-5px;left:58%;width:14px;height:14px;border-radius:50%;background:#fff}
  .hint{margin-top:14px;font-size:12px;color:var(--text-muted);background:var(--bg-card);
    border:1px dashed var(--border);border-radius:var(--radius-lg);padding:10px 12px}
  .hint b{color:var(--accent)}
  /* ── Piano ── */
  .lanes{position:absolute;inset:96px 0 214px;overflow:hidden;
    background:repeating-linear-gradient(90deg,transparent 0 41px,rgba(48,54,61,.5) 41px 42px)}
  .fnote{position:absolute;width:34px;border-radius:8px;background:var(--purple);opacity:.85}
  .fnote.blue{background:var(--accent)}
  .hitline{position:absolute;left:0;right:0;bottom:214px;height:2px;background:var(--accent);
    box-shadow:0 0 12px var(--accent);z-index:5}
  .keys{position:absolute;left:0;right:0;bottom:128px;height:86px;display:flex;background:#0a0d12}
  .wk{flex:1;background:linear-gradient(#f6f8fa,#d7dde3);border:1px solid #0a0d12;border-radius:0 0 6px 6px;position:relative}
  .bk{position:absolute;top:0;width:60%;height:54%;left:70%;background:#12161d;border-radius:0 0 4px 4px;z-index:6}
  .combo{position:absolute;top:10px;left:12px;background:var(--glass-bg);border:1px solid var(--glass-border);
    backdrop-filter:blur(12px);border-radius:10px;padding:5px 10px;font-size:11px;color:var(--text-secondary)}
  .combo b{color:var(--purple)}
  /* ── Exercises menu ── */
  .scroll{position:absolute;inset:34px 0 0;overflow:hidden;padding:0 14px}
  .large{font-size:30px;font-weight:700;margin:18px 0 10px}
  .filters{display:flex;gap:6px;margin-bottom:12px}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
  .cico{width:38px;height:38px;border-radius:10px;background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}
  .card h4{font-size:14px}
  .card p{font-size:11px;color:var(--text-muted)}
  .badge{margin-left:auto;font-size:10px;color:var(--green);border:1px solid rgba(63,185,80,.4);
    border-radius:var(--radius-pill);padding:2px 8px;flex:none}
  .start{margin-left:auto;background:var(--accent);color:#08131f;font-weight:600;font-size:12px;
    border-radius:var(--radius-pill);padding:7px 14px;flex:none}
  .weak{background:linear-gradient(135deg,rgba(188,140,255,.14),rgba(88,166,255,.10));
    border:1px solid rgba(188,140,255,.35)}
  .fade{position:absolute;left:0;right:0;bottom:0;height:96px;z-index:30;
    background:linear-gradient(transparent,#0d1117 70%);pointer-events:none}
  /* More sheet */
  .mrow{display:flex;align-items:center;gap:12px;min-height:46px;font-size:14px;
    border-bottom:1px solid rgba(48,54,61,.5)}
  .mrow:last-child{border-bottom:0}
  .mico{width:30px;height:30px;border-radius:8px;background:var(--bg-tertiary);color:var(--text-secondary);
    display:flex;align-items:center;justify-content:center;font-size:14px}
</style>
</head>
<body>

<!-- ── 2 · Options sheet ── -->

<!-- ── 5 · More sheet ── -->
<figure>
  <div class="phone">
    <div class="notch"></div>
    <div class="scroll" style="opacity:.35">
      <div class="large">Exercises</div>
      <div class="card"><div class="cico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M9 12h6M12.5 9.5 15 12l-2.5 2.5"/></svg></div><div><h4>Guided Warmup</h4><p>5-step daily routine</p></div></div>
    </div>
    <div class="dim"></div>
    <div class="sheet">
      <div class="grab"></div>
