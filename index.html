<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchPerfect - Voice Practice</title>
    <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
    <div id="app">
        <header>
            <h1>PitchPerfect</h1>
            <p class="subtitle">Voice Pitch Practice</p>
            <nav id="app-tabs">
                <button id="tab-practice" class="app-tab active">Practice</button>
                <button id="tab-editor" class="app-tab">Editor</button>
            </nav>
        </header>

        <div class="main-layout" id="main-layout">
            <!-- Left panel -->
            <aside id="notes-panel">
                <h2 class="panel-title">Scale</h2>
                <div id="scale-info">
                    <span class="key-label">Key:</span>
                    <select id="key-select">
                        <option value="C">C Major</option>
                        <option value="D">D Major</option>
                        <option value="E">E Major</option>
                        <option value="F">F Major</option>
                        <option value="G">G Major</option>
                        <option value="A">A Major</option>
                        <option value="Bb">Bb Major</option>
                    </select>
                    <span class="octave-label">Oct:</span>
                    <div class="octave-ctrl" id="octave-ctrl">
                        <button id="btn-octave-down" class="octave-btn" title="Lower octave">
                            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                        </button>
                        <span id="octave-value" class="octave-value">4</span>
                        <button id="btn-octave-up" class="octave-btn" title="Higher octave">
                            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                        </button>
                    </div>
                    <span class="preset-label">Preset:</span>
                    <select id="preset-select">
                        <option value="">— Select Preset —</option>
                    </select>
                    <button id="btn-clear-preset" class="ctrl-btn small" title="Clear preset melody">Clear</button>
                </div>
                <div id="note-list"></div>

                <!-- Pitch reference -->
                <div id="pitch-reference">
                    <h3>Your Pitch</h3>
                    <div id="detected-note">--</div>
                    <div id="detected-freq">-- Hz</div>
                    <div id="cents-display">
                        <div id="cents-bar">
                            <div id="cents-marker"></div>
                            <div class="cents-center"></div>
                        </div>
                        <div class="cents-labels">
                            <span>-50</span><span>0</span><span>+50</span>
                        </div>
                    </div>
                </div>

                <!-- Accuracy stats (left sidebar) -->
                <div id="stats-panel">
                    <h3>Accuracy</h3>
                    <div id="stats-bars">
                        <div class="stat-row" data-band="100">
                            <span class="stat-label">Perfect</span>
                            <div class="stat-bar-bg"><div class="stat-bar" id="bar-100"></div></div>
                            <span class="stat-count" id="cnt-100">0</span>
                        </div>
                        <div class="stat-row" data-band="90">
                            <span class="stat-label">Excellent</span>
                            <div class="stat-bar-bg"><div class="stat-bar" id="bar-90"></div></div>
                            <span class="stat-count" id="cnt-90">0</span>
                        </div>
                        <div class="stat-row" data-band="75">
                            <span class="stat-label">Good</span>
                            <div class="stat-bar-bg"><div class="stat-bar" id="bar-75"></div></div>
                            <span class="stat-count" id="cnt-75">0</span>
                        </div>
                        <div class="stat-row" data-band="50">
                            <span class="stat-label">Okay</span>
                            <div class="stat-bar-bg"><div class="stat-bar" id="bar-50"></div></div>
                            <span class="stat-count" id="cnt-50">0</span>
                        </div>
                        <div class="stat-row" data-band="0">
                            <span class="stat-label">Off</span>
                            <div class="stat-bar-bg"><div class="stat-bar" id="bar-0"></div></div>
                            <span class="stat-count" id="cnt-0">0</span>
                        </div>
                    </div>
                    <div id="score-display">
                        <span id="score-label">Score:</span>
                        <span id="score-value">--</span>
                    </div>
                </div>
            </aside>

            <!-- Right panel -->
            <main id="pitch-area">
                <!-- Top control bar -->
                <div id="controls">
                    <!-- Transport -->
                    <button id="btn-mic" class="ctrl-btn" title="Toggle Microphone">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Mic Off</span>
                    </button>
                    <button id="btn-play" class="ctrl-btn" title="Play">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                        <span>Play</span>
                    </button>
                    <button id="btn-pause" class="ctrl-btn" disabled title="Pause">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <span>Pause</span>
                    </button>
                    <button id="btn-stop" class="ctrl-btn" disabled title="Stop">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 6h12v12H6z"/></svg>
                        <span>Stop</span>
                    </button>

                    <div class="ctrl-sep"></div>

                    <!-- Mode toggles -->
                    <div id="mode-group">
                        <button id="btn-once" class="mode-btn active">Once</button>
                        <button id="btn-repeat" class="mode-btn">Repeat</button>
                        <button id="btn-practice" class="mode-btn">Practice</button>
                    </div>

                    <!-- Practice options (visible when Practice mode) -->
                    <div id="practice-options" class="hidden">
                        <label class="opt-label">Cycles:</label>
                        <input type="number" id="cycles" min="2" max="20" value="5" class="cycles-input">
                        <button id="btn-start-practice" class="ctrl-btn accent">Start</button>
                    </div>

                    <div class="ctrl-sep"></div>

                    <!-- Tempo -->
                    <div class="tempo-group">
                        <label class="opt-label">BPM:</label>
                        <input type="range" id="tempo" min="40" max="280" value="80" class="tempo-slider">
                        <span id="tempo-value">80</span>
                    </div>

                    <!-- Metronome Precount -->
                    <button id="btn-metronome" class="ctrl-btn metronome-btn" title="Toggle Precount">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2L8 22h8L12 2zm0 4.5l2.3 11h-4.6L12 6.5z"/><rect x="11" y="4" width="2" height="2"/></svg>
                        <span>Pre</span>
                    </button>

                    <!-- Sensitivity -->
                    <div class="sensitivity-group">
                        <label class="opt-label">Sens:</label>
                        <input type="range" id="sensitivity" min="1" max="10" value="5" class="sensitivity-slider">
                        <span id="sensitivity-value">5</span>
                    </div>

                    <!-- Volume -->
                    <div class="volume-group">
                        <label class="opt-label">Vol:</label>
                        <input type="range" id="volume" min="0" max="100" value="70" class="volume-slider">
                        <span id="volume-value">70</span>
                    </div>

                    <!-- Run indicator (spacer push) -->
                    <div id="run-indicator">
                        <span id="run-counter">Run 1</span>
                        <span id="cycle-counter"></span>
                    </div>
                </div>

                <!-- Canvas -->
                <div id="canvas-container">
                    <canvas id="pitch-canvas"></canvas>
                    <div id="playhead"></div>
                </div>

                <!-- History -->
                <div id="history-container">
                    <canvas id="history-canvas"></canvas>
                </div>
            </main>

            <!-- Piano Roll Editor -->
            <div id="editor-panel" class="hidden">
                <div id="piano-roll-container"></div>
            </div>
        </div>
    </div>

    <!-- Score overlay -->
    <div id="score-overlay" class="overlay hidden">
        <div id="score-card">
            <button id="score-close" class="overlay-close" title="Close">&times;</button>
            <h2 id="score-title">Run Complete!</h2>
            <div id="score-grade"></div>
            <div id="score-pct"></div>
            <div id="score-detail"></div>
            <div id="score-stats"></div>
            <div id="score-actions">
                <button id="btn-retry" class="overlay-btn primary">Try Again</button>
                <button id="btn-next" class="overlay-btn">Next Run</button>
            </div>
        </div>
    </div>

    <script src="audio-engine.js"></script>
    <script src="pitch-detector.js"></script>
    <script src="scale-data.js?v=2"></script>
    <script src="piano-roll.js?v=3"></script>
    <script src="app.js?v=21"></script>
</body>
</html>
