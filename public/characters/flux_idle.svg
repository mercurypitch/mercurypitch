<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Flux: Vocal Runs & Mixed Voice Specialist (Idle) -->
  <defs>
    <linearGradient id="fluxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body (Wave-like/Sleek) -->
  <path d="M50 20 C70 20 80 40 80 60 C80 80 60 90 40 90 C20 90 20 70 20 50 C20 30 30 20 50 20" fill="url(#fluxGrad)" />
  <!-- Dynamic lines -->
  <path d="M85 50 Q90 55 85 60" stroke="#58a6ff" stroke-width="2" fill="none" />
  <path d="M15 40 Q10 45 15 50" stroke="#3fb950" stroke-width="2" fill="none" />
  <!-- Eyes (Focused/Sharp) -->
  <rect x="35" y="45" width="8" height="3" rx="1.5" fill="white" />
  <rect x="57" y="45" width="8" height="3" rx="1.5" fill="white" />
  <!-- Mouth (Cool/Confident) -->
  <path d="M45 70 L55 70" stroke="white" stroke-width="2" stroke-linecap="round" />
</svg>
