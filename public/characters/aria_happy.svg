<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Aria: Falsetto/Head Voice Specialist (Happy) -->
  <defs>
    <linearGradient id="ariaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <path d="M50 15 Q80 15 90 45 Q90 80 50 80 Q10 80 10 45 Q20 15 50 15" fill="url(#ariaGrad)" />
  <!-- Floating notes (More) -->
  <circle cx="15" cy="20" r="4" fill="#bc8cff" opacity="0.8" />
  <circle cx="85" cy="25" r="3" fill="#2dd4bf" opacity="0.8" />
  <circle cx="50" cy="10" r="2" fill="#ffffff" opacity="0.5" />
  <!-- Eyes (Joyful) -->
  <path d="M35 50 Q40 55 45 50" stroke="white" stroke-width="3" fill="none" />
  <path d="M55 50 Q60 55 65 50" stroke="white" stroke-width="3" fill="none" />
  <!-- Mouth (Happy Smile) -->
  <path d="M40 65 Q50 75 60 65" stroke="white" stroke-width="2" fill="none" />
</svg>
