<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Aria: Falsetto/Head Voice Specialist (Idle) -->
  <defs>
    <linearGradient id="ariaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body (Soft/Cloud-like) -->
  <path d="M50 20 Q75 20 85 45 Q85 85 50 85 Q15 85 15 45 Q25 20 50 20" fill="url(#ariaGrad)" />
  <!-- Floating notes -->
  <circle cx="20" cy="25" r="3" fill="#bc8cff" opacity="0.6" />
  <circle cx="80" cy="30" r="2" fill="#2dd4bf" opacity="0.6" />
  <!-- Eyes (Serene/Closed) -->
  <path d="M35 55 Q40 50 45 55" stroke="white" stroke-width="2" fill="none" />
  <path d="M55 55 Q60 50 65 55" stroke="white" stroke-width="2" fill="none" />
  <!-- Mouth (Small/Soft) -->
  <path d="M45 70 Q50 75 55 70" stroke="white" stroke-width="2" fill="none" />
</svg>
