<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="vocalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="instGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Glow aura -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.12"/>

  <!-- Vocal stem — upper waveform splitting upward -->
  <path d="M4 16 C8 10, 12 10, 16 16 C20 10, 24 10, 28 16"
        fill="none" stroke="url(#vocalGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Vocal peak accents -->
  <circle cx="10" cy="10" r="1.2" fill="#bc8cff" opacity="0.9"/>
  <circle cx="22" cy="10" r="1.2" fill="#bc8cff" opacity="0.9"/>

  <!-- Instrumental stem — lower waveform splitting downward -->
  <path d="M4 16 C8 22, 12 22, 16 16 C20 22, 24 22, 28 16"
        fill="none" stroke="url(#instGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Instrumental valley accents -->
  <circle cx="10" cy="22" r="1.2" fill="#2dd4bf" opacity="0.9"/>
  <circle cx="22" cy="22" r="1.2" fill="#2dd4bf" opacity="0.9"/>

  <!-- Source dot — unified audio origin -->
  <circle cx="4" cy="16" r="2" fill="#e6edf3"/>
</svg>
